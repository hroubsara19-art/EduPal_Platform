{# student_app/templates/student_app/chatbot_widget_js.html #}
<script>
(function(){
'use strict';

/* ══════════════════════════════════════════════════════
   1. قراءة الإعدادات من data-* 
   ══════════════════════════════════════════════════════ */
var _cfg = document.getElementById('chat-config');

var _chatUrl    = _cfg ? _cfg.dataset.chatUrl   : '';
var _csrf       = _cfg ? _cfg.dataset.csrf       : '';
var _chatLimit  = _cfg ? parseInt(_cfg.dataset.limit || '20') : 20;
var _chatUsed   = _cfg ? parseInt(_cfg.dataset.used  || '0')  : 0;
var _lessonTitle = _cfg ? (_cfg.dataset.lessonTitle || 'الدرس') : 'الدرس';

/* ══════════════════════════════════════════════════════
   2. الحالة الداخلية
   ══════════════════════════════════════════════════════ */
var chatOpen      = false;
var chatLoading   = false;
var chatRemaining = _chatLimit - _chatUsed;
var currentAudio  = null; // لتخزين كائن الصوت النشط
var currentAudioUrl = null; // لتخزين مسار Blob النشط
var currentAnimationFrame = null; // لتخزين معرف إطار الحركة بالتزامن الدقيق

var chatHistory = [];

/* ══════════════════════════════════════════════════════
   3. نظام التعرف على الكلام (Speech Recognition)
   ══════════════════════════════════════════════════════ */
var recognition = null;
var isRecognizing = false;

function initSpeech() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) return;
    
    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'ar-SA';
    recognition.interimResults = true;
    recognition.continuous = false;

    recognition.onstart = function() {
        isRecognizing = true;
        var btn = document.getElementById('chat-mic-btn');
        if (btn) btn.classList.add('active');
    };

    recognition.onresult = function(event) {
        var transcript = "";
        for (var i = event.resultIndex; i < event.results.length; ++i) {
            transcript += event.results[i][0].transcript;
        }
        var inp = document.getElementById('chat-input');
        if (inp) {
            inp.value = transcript;
            window.autoResize(inp);
        }
    };

    recognition.onerror = function(event) {
        console.log('[Chat] Speech recognition error:', event.error);
        stopSpeechUI();
    };

    recognition.onend = function() {
        stopSpeechUI();
    };
}

function startSpeech() {
    if (!recognition) initSpeech();
    if (!recognition) return;
    try {
        recognition.start();
    } catch(e) {
        console.log('[Chat] Speech already started');
    }
}

function stopSpeechUI() {
    isRecognizing = false;
    var btn = document.getElementById('chat-mic-btn');
    if (btn) btn.classList.remove('active');
}

/* ══════════════════════════════════════════════════════
   4. نظام توليد الصوت والتظليل المترابط الفائق (Word-Level Sync TTS)
   ══════════════════════════════════════════════════════ */

function stopVoice() {
    if (currentAnimationFrame) {
        cancelAnimationFrame(currentAnimationFrame);
        currentAnimationFrame = null;
    }
    if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
    }
    if (currentAudioUrl) {
        URL.revokeObjectURL(currentAudioUrl);
        currentAudioUrl = null;
    }
    // إزالة التظليل عن جميع النصوص واستعادة أزرار الصوت
    document.querySelectorAll('.word.highlighted').forEach(function(el){
        el.classList.remove('highlighted');
    });
    document.querySelectorAll('.voice-btn.playing').forEach(function(b){
        b.classList.remove('playing');
    });
}

// تشغيل صوت رسالة معينة مع تظليل الكلمات بدقة باللون الأصفر
window.playMessageVoice = async function(btn) {
    var msgDiv = btn.closest('.chat-msg');
    var contentDiv = msgDiv.querySelector('.msg-content');
    
    // حفظ النص الأصلي غير المنسق إذا لم يكن محفوظاً
    if (!contentDiv.dataset.originalText) {
        contentDiv.dataset.originalText = contentDiv.innerText.trim();
    }
    var text = contentDiv.dataset.originalText;
    
    if (!text) return;

    // إذا كان نفس الزر يعمل حالياً: أوقفه
    if (btn.classList.contains('playing')) {
        stopVoice();
        contentDiv.innerText = text; // إعادة النص كـ Plain text
        return;
    }

    // إيقاف أي صوت سابق
    stopVoice();

    // تقسيم النص إلى كلمات وتجهيز الـ DOM للتظليل
    var words = text.split(/\s+/).filter(Boolean);
    contentDiv.innerHTML = words.map(function(word, idx) {
        return '<span class="word" data-index="' + idx + '">' + word + '</span>';
    }).join(' ');

    var wordElements = contentDiv.querySelectorAll('.word');
    btn.classList.add('playing');

    try {
        const response = await fetch('/api/generate-voice/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: text })
        });

        if (!response.ok) throw new Error('Voice generation failed');

        // التعامل مع الاستجابة سواء كانت محملة بتوقيتات الكلمات (JSON) أو ملف صوتي مباشر (Blob)
        const contentType = response.headers.get('content-type') || '';
        let audioBase64 = null;
        let alignmentData = null;

        if (contentType.includes('application/json')) {
            const data = await response.json();
            audioBase64 = data.audio;
            alignmentData = data.alignment || data.words; // دعم توقيتات الكلمات من السيرفر
        } else {
            const audioBlob = await response.blob();
            currentAudioUrl = URL.createObjectURL(audioBlob);
        }

        if (audioBase64) {
            currentAudioUrl = 'data:audio/mp3;base64,' + audioBase64;
        }

        const audio = new Audio(currentAudioUrl);
        currentAudio = audio;

        // ✅ خوارزمية التزامن الدقيق بالمللي ثانية (High-Precision Word Timing)
        function syncWordHighlight() {
            if (!audio || audio.paused || audio.ended) return;
            
            var currentTime = audio.currentTime;

            if (alignmentData && alignmentData.length > 0) {
                // التزامن الفعلي الدقيق باستخدام توقيتات الكلمات من السيرفر
                alignmentData.forEach(function(item, idx) {
                    var el = wordElements[idx];
                    if (!el) return;
                    if (currentTime >= item.start && currentTime <= item.end) {
                        el.classList.add('highlighted');
                    } else {
                        el.classList.remove('highlighted');
                    }
                });
            } else if (audio.duration) {
                // التزامن التقديري الاحتياطي
                var progress = currentTime / audio.duration;
                var currentWordIndex = Math.min(
                    Math.floor(progress * words.length),
                    words.length - 1
                );

                wordElements.forEach(function(el, idx) {
                    if (idx === currentWordIndex) {
                        el.classList.add('highlighted');
                    } else {
                        el.classList.remove('highlighted');
                    }
                });
            }

            currentAnimationFrame = requestAnimationFrame(syncWordHighlight);
        }

        audio.addEventListener('play', function() {
            currentAnimationFrame = requestAnimationFrame(syncWordHighlight);
        });

        // عند انتهاء التشغيل
        audio.addEventListener('ended', function() {
            btn.classList.remove('playing');
            contentDiv.innerText = text; // إعادة النص لطبيعته
            stopVoice();
        });

        // عند حدوث خطأ أثناء التشغيل
        audio.addEventListener('error', function() {
            btn.classList.remove('playing');
            contentDiv.innerText = text;
            stopVoice();
        });

        await audio.play();

    } catch (error) {
        console.error('Error playing voice:', error);
        btn.classList.remove('playing');
        contentDiv.innerText = text;
        stopVoice();
    }
};

/* ══════════════════════════════════════════════════════
   5. تهيئة عنوان الدرس وشارة الكوتا
   ══════════════════════════════════════════════════════ */
function initUI() {
    var titleEl = document.getElementById('chat-lesson-title');
    if (titleEl) titleEl.textContent = _lessonTitle;
    updateQuotaUI();
}

function updateQuotaUI(rem) {
    if (rem !== undefined) chatRemaining = rem;
    var rem2  = Math.max(0, chatRemaining);
    var badge = document.getElementById('chat-quota-badge');
    if (badge) {
        badge.textContent = rem2 + ' رسالة متبقية';
        badge.style.color = rem2 <= 5 ? '#fca5a5' : 'rgba(255,255,255,.85)';
    }
}

/* ══════════════════════════════════════════════════════
   6. فتح وإغلاق النافذة
   ══════════════════════════════════════════════════════ */
window.toggleChat = function() {
    chatOpen = !chatOpen;
    var panel = document.getElementById('chat-panel');
    var fab   = document.getElementById('chat-fab');
    if (!panel) return;

    panel.classList.toggle('open', chatOpen);
    
    if (chatOpen) {
        if (fab) fab.style.display = 'none';
        stopVoice();
        
        if (typeof stopAttentionTracking === 'function') {
            stopAttentionTracking();
        }
        
        if (isRecognizing) {
            recognition.stop();
        }

        var audio = document.getElementById('topAudio');
        if (audio && !audio.paused) {
            audio.pause();
            window.audioPausedForAIAssistant = true;
        }
        var video = document.querySelector('video.video-player');
        if (video && !video.paused) {
            video.pause();
            window.videoPausedForAIAssistant = true;
        }

        setTimeout(function() {
            var inp = document.getElementById('chat-input');
            if (inp) inp.focus();
            scrollChat();
        }, 300);
    } else {
        if (fab) fab.style.display = 'flex';

        var audio = document.getElementById('topAudio');
        if (audio && window.audioPausedForAIAssistant) {
            audio.play().catch(function(e){ console.log('[Chat] Autoplay blocked:', e); });
            window.audioPausedForAIAssistant = false;
        }
        var video = document.querySelector('video.video-player');
        if (video && window.videoPausedForAIAssistant) {
            video.play().catch(function(e){ console.log('[Chat] Autoplay blocked:', e); });
            window.videoPausedForAIAssistant = false;
        }
    }
};

/* ══════════════════════════════════════════════════════
   7. إرسال الرسالة — الدالة الرئيسية
   ══════════════════════════════════════════════════════ */
window.sendChat = function() {
    if (chatLoading) return;

    var inp = document.getElementById('chat-input');
    var msg = (inp ? inp.value : '').trim();
    if (!msg) return;

    if (chatRemaining <= 0) {
        appendMsg('bot', 'لقد استهلكت محاولاتك اليوم، نراك غداً بنشاط جديد!');
        return;
    }

    inp.value = '';
    inp.style.height = 'auto';
    appendMsg('user', msg);

    chatLoading = true;
    var sendBtn = document.getElementById('chat-send');
    if (sendBtn) sendBtn.disabled = true;

    var typingId = 'typing_' + Date.now();
    showTyping(typingId);

    var historyToSend = chatHistory.slice(-6);

    fetch(_chatUrl, {
        method:  'POST',
        headers: {
            'Content-Type':     'application/json',
            'X-CSRFToken':      _csrf,
            'X-Requested-With': 'XMLHttpRequest',
        },
        body: JSON.stringify({
            message: msg,
            history: historyToSend,
        }),
    })
    .then(function(response) {
        return response.json().then(function(data) {
            return { status: response.status, data: data };
        });
    })
    .then(function(result) {
        removeTyping(typingId);
        chatLoading = false;
        if (sendBtn) sendBtn.disabled = false;

        var data   = result.data;
        var status = result.status;

        if (data.ok) {
            appendMsg('bot', data.reply, false, true);
        } else if (status === 429 || data.quota_exceeded) {
            appendMsg('bot', '🌟 ' + (data.error || 'وصلت للحد اليومي. عد غداً!'));
            chatRemaining = 0;
            updateQuotaUI(0);
            return;
        } else if (status === 503 && data.reply) {
            appendMsg('bot', data.reply);
            return;
        } else {
            var errMsg = data.reply || data.error || 'عذراً، حدث خطأ غير متوقع. حاول مرة أخرى.';
            appendMsg('bot', errMsg, true);
            return;
        }

        chatHistory.push({ role: 'user',  parts: [{ text: msg }] });
        chatHistory.push({ role: 'model', parts: [{ text: data.reply }] });

        if (chatHistory.length > 12) {
            chatHistory = chatHistory.slice(-12);
        }

        if (data.remaining !== undefined) {
            updateQuotaUI(data.remaining);
        } else if (!data.is_out_of_scope) {
            chatRemaining = Math.max(0, chatRemaining - 1);
            updateQuotaUI();
        }
    })
    .catch(function(err) {
        removeTyping(typingId);
        chatLoading = false;
        if (sendBtn) sendBtn.disabled = false;
        appendMsg('bot', 'تعذّر الاتصال بالسيرفر — تحقق من الإنترنت وأعد المحاولة.', true);
        console.error('[Chat] fetch error:', err);
    });
};

/* ══════════════════════════════════════════════════════
   8. أدوات الواجهة
   ══════════════════════════════════════════════════════ */

function cleanBotText(text) {
    return text
      .replace(/\*\*[^*]+\*\*/g, '')
      .replace(/[\u{1F600}-\u{1F64F}]/gu, '')
      .replace(/[\u{1F300}-\u{1F5FF}]/gu, '')
      .replace(/[\u{1F680}-\u{1F6FF}]/gu, '')
      .replace(/[\u{1F700}-\u{1F77F}]/gu, '')
      .replace(/[\u{1F780}-\u{1F7FF}]/gu, '')
      .replace(/[\u{1F800}-\u{1F8FF}]/gu, '')
      .replace(/[\u{1F900}-\u{1F9FF}]/gu, '')
      .replace(/[\u{1FA00}-\u{1FA6F}]/gu, '')
      .replace(/[\u{1FA70}-\u{1FAFF}]/gu, '')
      .replace(/[\u{2600}-\u{26FF}]/gu, '')
      .replace(/[\u{2700}-\u{27BF}]/gu, '')
      .replace(/[★☆✓✗✓✔✕❌❎⭕❌]/g, '')
      .replace(/[⭐🌟💫]/g, '')
      .replace(/[🔥💪🎯📚✨🎉]/g, '')
      .replace(/[a-zA-Z]/g, '')
      .replace(/\s+/g, ' ')
      .trim();
}

function appendMsg(type, text, isError, isNewBotMsg) {
    var msgsEl = document.getElementById('chat-messages');
    if (!msgsEl) return;

    var div = document.createElement('div');
    var cls = 'chat-msg ' + (type === 'user' ? 'user' : 'bot');
    if (isError) cls += ' error-msg';
    div.className = cls;

    var cleanText = cleanBotText(text);
    
    if (type === 'bot' && !isError) {
        div.innerHTML = `
            <div class="msg-content">${cleanText}</div>
            <button class="voice-btn" onclick="playMessageVoice(this)" title="تشغيل الصوت">
                <i class="fas fa-volume-up"></i>
            </button>
        `;
        
        if (isNewBotMsg && cleanText) {
            setTimeout(function() {
                var btn = div.querySelector('.voice-btn');
                if (btn) playMessageVoice(btn);
            }, 500);
        }
    } else {
        div.innerText = cleanText;
    }
    
    msgsEl.appendChild(div);
    scrollChat();
}

function showTyping(id) {
    var msgsEl = document.getElementById('chat-messages');
    if (!msgsEl) return;
    var div = document.createElement('div');
    div.className = 'chat-msg bot';
    div.id = id;
    div.innerHTML =
        '<div class="typing-dots">' +
        '<span></span><span></span><span></span>' +
        '</div>';
    msgsEl.appendChild(div);
    scrollChat();
}

function removeTyping(id) {
    var el = document.getElementById(id);
    if (el) el.remove();
}

function scrollChat() {
    var msgsEl = document.getElementById('chat-messages');
    if (msgsEl) msgsEl.scrollTo({ top: msgsEl.scrollHeight, behavior: 'smooth' });
}

/* ══════════════════════════════════════════════════════
   9. أحداث وتفاعلات الواجهة
   ══════════════════════════════════════════════════════ */
window.handleChatKey = function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        window.sendChat();
    }
};

window.toggleSpeech = function() {
    if (!recognition) initSpeech();
    if (!recognition) {
        alert("متصفحك لا يدعم التعرف على الصوت.");
        return;
    }

    if (isRecognizing) {
        recognition.stop();
    } else {
        try {
            recognition.start();
        } catch (e) {
            console.error("Mic start error:", e);
        }
    }
};

window.autoResize = function(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
};

document.addEventListener('DOMContentLoaded', function() {
    initUI();
    initSpeech();
});

document.head.appendChild(style);

})();
</script>
